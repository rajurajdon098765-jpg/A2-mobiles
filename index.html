<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A2 Shiva Smart Services</title>
    <meta name="description" content="A2 Shiva Smart Services - Your one-stop destination for travel bookings, utilities, banking, government documents, insurance, stationery and smart gadgets." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>

    <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="text" name="phone" />
      <input type="email" name="email" />
      <input type="text" name="service" />
      <textarea name="message"></textarea>
    </form>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
